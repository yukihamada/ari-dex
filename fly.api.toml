app = "ari-dex-api"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.api"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  DB_PATH = "/data/ari-dex.db"

[mounts]
  source = "ari_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
